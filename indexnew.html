<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict HDI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { max-width: 500px; background: white; padding: 30px; margin: auto; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .result { margin-top: 20px; font-size: 18px; font-weight: bold; color: #0056b3; text-align: center; }
        .home-link { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <h2>HDI Predictor Form</h2>
        <form action="/predict" method="post">
            <div class="form-group">
                <label>Select Country Reference Context:</label>
                <select name="country" required>
                    <option value="">--Select Country--</option>
                    <option value="Global-Average">Global Representative Model</option>
                </select>
            </div>
            <div class="form-group">
                <label>Life Expectancy at Birth (years):</label>
                <input type="number" step="0.1" name="life_exp" placeholder="e.g. 72.5" required>
            </div>
            <div class="form-group">
                <label>Expected Years of Schooling (years):</label>
                <input type="number" step="0.1" name="exp_school" placeholder="e.g. 13.1" required>
            </div>
            <div class="form-group">
                <label>Mean Years of Schooling (years):</label>
                <input type="number" step="0.1" name="mean_school" placeholder="e.g. 8.7" required>
            </div>
            <div class="form-group">
                <label>Gross National Income (GNI) per Capita ($):</label>
                <input type="number" step="1" name="gni" placeholder="e.g. 12000" required>
            </div>
            <button type="submit">Predict</button>
        </form>

        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
        
        <a href="/" class="home-link">← Back to Home</a>
    </div>
</body>
</html>
